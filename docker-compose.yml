services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: vitrine-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 5s
      timeout: 10s
      retries: 20

  init-topics:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        rpk topic create vitrine.raw.events -p 3 -r 1 --brokers redpanda:9092 || true
        rpk topic create vitrine.processed.events -p 3 -r 1 --brokers redpanda:9092 || true
        rpk topic create vitrine.alerts -p 3 -r 1 --brokers redpanda:9092 || true
        rpk topic create vitrine.kpis -p 1 -r 1 --brokers redpanda:9092 || true
        rpk topic list --brokers redpanda:9092
    restart: "no"

  spark:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: vitrine-spark
    depends_on:
      init-topics:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPARK_ENGINE: microbatch
      SPARK_BATCH_SECONDS: "10"
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: vitrine-producer
    depends_on:
      init-topics:
        condition: service_completed_successfully
      spark:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_RAW_TOPIC: vitrine.raw.events
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vitrine-api
    depends_on:
      init-topics:
        condition: service_completed_successfully
      spark:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PIPELINE_MODE: kafka
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    restart: unless-stopped
