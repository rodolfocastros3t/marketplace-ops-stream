# Blueprint Ops Stream — Free tier
# Serve o React build versionado em backend/static (mesmo UX do localhost:5173)

services:
  - type: web
    name: ops-stream-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PIPELINE_MODE
        value: embedded
